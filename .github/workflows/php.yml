name: PHP Composer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - illuminate: "^11"
            testbench: "^9"
            php: "8.2"
          - illuminate: "^12"
            testbench: "^10"
            php: "8.2"
          - illuminate: "^13"
            testbench: "^11"
            php: "8.3"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run test suite
        run: vendor/bin/phpunit --testsuite unit

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    container: chialab/php-pcov:8.3

    steps:
      - uses: actions/checkout@v4

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests with coverage
        run: |
          mkdir -p build
          vendor/bin/phpunit --testsuite unit --coverage-clover build/coverage.xml

      - name: Extract coverage percentage
        id: cov
        run: |
          PCT=$(php -r "
            \$xml = simplexml_load_file('build/coverage.xml');
            \$metrics = \$xml->xpath('//metrics');
            \$total = \$covered = 0;
            foreach (\$metrics as \$m) {
              \$total   += (int) \$m['statements'];
              \$covered += (int) \$m['coveredstatements'];
            }
            echo \$total > 0 ? round(\$covered / \$total * 100) : 0;
          ")
          echo "pct=\$PCT" >> \$GITHUB_OUTPUT

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: weclapp-unit-coverage.json
          label: unit coverage
          message: ${{ steps.cov.outputs.pct }}%
          valColorRange: ${{ steps.cov.outputs.pct }}
          minColorRange: 50
          maxColorRange: 100

  analyse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer run-script analyse

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Pint
        run: composer run-script lint:check
