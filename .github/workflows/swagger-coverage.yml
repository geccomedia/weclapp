name: Swagger Coverage

on:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run swagger coverage
        id: coverage
        run: |
          JSON=$(php scripts/swagger-coverage --json)
          PCT=$(echo "$JSON" | php -r "echo round(json_decode(file_get_contents('php://stdin'), true)['overall']);")
          echo "pct=$PCT" >> $GITHUB_OUTPUT

      - name: Update badge
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: weclapp-swagger-coverage.json
          label: swagger coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 50
          maxColorRange: 100
